    <style>
        :root {
            --royal-emerald: #004d38;
            --deep-emerald: #003324;
            --olive-accent: #5c6b30;
            --bright-olive: #708238;
            --dark-slate: #060b09;
            --matte-black: #030504;

            --white-silk: #f4f6f4;
            --translucent-silk: rgba(244, 246, 246, 0.85);
            --glass-dark: rgba(6, 11, 9, 0.75);
            --glass-darker: rgba(3, 5, 4, 0.9);
            --glass-emerald: rgba(0, 51, 36, 0.5);

            --gold-primary: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fcf6ba 75%, #bf953f 100%);
            --gold-shimmer: linear-gradient(90deg, #b38728 0%, #fcf6ba 50%, #b38728 100%);
            --gold-solid: #c5a059;
            --gold-pale: #e5cf9a;
            --gold-muted: rgba(197, 160, 89, 0.3);

            --transition-epic: all 1.4s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-smooth: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            --transition-snappy: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);

            --shadow-subtle: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-luxury: 0 20px 50px rgba(0, 0, 0, 0.6);
            --shadow-gold-glow: 0 0 25px rgba(197, 160, 89, 0.25);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--dark-slate);
            overflow-x: hidden;
            text-size-adjust: 100%;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            color: var(--white-silk);
            /* FIX: layered fallback background so it never looks "broken" even if
               the video never loads on a slow mobile connection */
            background-color: var(--dark-slate);
            background-image:
                linear-gradient(to bottom, rgba(3,5,4,0.75), rgba(3,5,4,0.9)),
                url('kofolove.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            position: relative;
        }

        .gold-text-gradient {
            background: var(--gold-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .premium-caps-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--translucent-silk);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--matte-black); }
        ::-webkit-scrollbar-thumb { background: var(--gold-solid); border-radius: 3px; }

        .scroll-progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 3px;
            width: 0%;
            background: var(--gold-primary);
            z-index: 2000;
            box-shadow: 0 0 12px rgba(197, 160, 89, 0.6);
            transition: width 0.05s linear;
        }

        .letter-reveal-wrap { display: inline-block; overflow: hidden; }
        .letter-char {
            display: inline-block;
            opacity: 0;
            transform: translateY(60%);
            animation: letterRise 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes letterRise {
            to { opacity: 1; transform: translateY(0); }
        }

        .ambient-video-background-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -10;
            overflow: hidden;
            pointer-events: none;
            /* FIX: opacity starts at 0 and fades the video in only once it can
               actually play — until then the CSS body background (above) shows,
               so there's never a blank/broken-looking frame */
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        .ambient-video-background-wrapper.video-ready { opacity: 1; }

        #cinematic-bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(80%) contrast(108%) saturate(100%);
            transform: scale(1.02);

            z-index: -9;

        .arabic-scripture-typography {

        .infinite-marquee-cinematic-conveyor {

        .chronometric-splitter-colon {

        .chapters-narrative-section { padding: 6rem 2rem 4rem 2rem; max-width: 1100px; margin: 0 auto; }

        .chapters-grid {
            display: flex;
            gap: 1.5rem;
            margin-top: 4rem;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 1rem;
            scrollbar-width: none;
        }
        .chapters-grid::-webkit-scrollbar { display: none; }
        .chapter-card {
            position: relative;
            height: 420px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: var(--shadow-subtle);
            cursor: pointer;
            background: var(--matte-black);
            flex: 0 0 82%;
            max-width: 340px;
            scroll-snap-align: center;
        }
        @media (min-width: 900px) {
            .chapter-card { flex: 0 0 30%; }
        }

        .chapter-dots { display: flex; justify-content: center; gap: 0.6rem; margin-top: 1.8rem; }
        .chapter-dot {
            width: 7px; height: 7px; border-radius: 50%;

            transition: var(--transition-snappy);

            transition: opacity 0.6s ease, transform 0.6s ease;

        .chapter-face-front { opacity: 1; transform: translateY(0); }

        .chapter-card.expanded .chapter-face-front { opacity: 0; transform: translateY(-28px); pointer-events: none; }
        .chapter-card.expanded .chapter-face-back { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .chapter-story-text {
            font-size: 1rem; line-height: 1.85; font-style: italic; color: var(--white-silk);
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);

        .chapter-number { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; letter-spacing: 0.3em; color: var(--gold-solid); text-transform: uppercase; margin-bottom: 0.8rem; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        .chapter-tap-indicator {

        .chapter-tap-indicator::after { content: '•'; color: var(--gold-solid); animation: pulseDot 1.5s infinite alternate; }
        @keyframes pulseDot { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        .chapter-card:hover .chapter-img { transform: scale(1.06); opacity: 0.55; filter: brightness(60%) contrast(110%); }
        .chapter-card:hover .chapter-tap-indicator { background: var(--gold-primary); color: var(--matte-black); border-color: transparent; box-shadow: var(--shadow-gold-glow); }
