<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 
    ===================================================================
    DIGITAL WEDDING INVITATION: FAIZA & ABDULMUMIN
    PROJECT: #KoFosealedinlove26#

    ===================================================================
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="The Digital Wedding Invitation for Faiza and Abdulmumin. #KoFosealedinlove26#">
    
    <title>The Wedding of Faiza & Abdulmumin — #KoFosealedinlove26#</title>

    <!-- Font Integration: Performance Optimized -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">

    <style>
        /* 
        ===================================================================
        GLOBAL VARIABLE DEFINITIONS & ROOT DESIGN TOKENS
        ===================================================================
        */
        :root {
            /* Palette Configuration */
            --royal-emerald: #004d38;
            --deep-emerald: #003324;
            --olive-accent: #5c6b30;
            --bright-olive: #708238;
            --dark-slate: #060b09;
            --matte-black: #030504;
            --white-silk: #f4f6f4;
            --translucent-silk: rgba(244, 246, 246, 0.85);
            
            /* Glassmorphism Layers */
            --glass-dark: rgba(6, 11, 9, 0.75);
            --glass-darker: rgba(3, 5, 4, 0.9);
            --glass-emerald: rgba(0, 51, 36, 0.5);
            
            /* Gold Aesthetic */
            --gold-primary: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fcf6ba 75%, #bf953f 100%);
            --gold-shimmer: linear-gradient(90deg, #b38728 0%, #fcf6ba 50%, #b38728 100%);
            --gold-solid: #c5a059;
            --gold-pale: #e5cf9a;
            --gold-muted: rgba(197, 160, 89, 0.3);
            
            /* Motion Dynamics */
            --transition-epic: all 1.4s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-smooth: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            --transition-snappy: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Shadow Systems */
            --shadow-subtle: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-luxury: 0 20px 50px rgba(0, 0, 0, 0.6);
            --shadow-gold-glow: 0 0 25px rgba(197, 160, 89, 0.25);
        }

        /* 
        ===================================================================
        RESET & BASE LAYOUT (FIXED: Layering conflict solved)
        ===================================================================
        */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            /* Removed body background; handled in site-background-layers */
            background-color: var(--dark-slate); 
            overflow-x: hidden;
            text-size-adjust: 100%;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            color: var(--white-silk);
            min-height: 100vh;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            position: relative;
            /* Explicitly set transparent to avoid canvas/video obscuring */
            background: transparent; 
        }

        /* Lock scroll during intro */
        body.envelope-locked { 
            overflow: hidden; 
            height: 100vh; 
        }

        /* 
        ===================================================================
        LAYERED ARCHITECTURE SYSTEM (FIXED BUG: Stacking Order)
        ===================================================================
        Layer 0: Background Container
        Layer 1: Video (Background)
        Layer 2: Overlays (Islamic Texture, Meshes)
        Layer 3: Particles & Canvas (Animations)
        Layer 4: User Interface Content
        ===================================================================
        */
        
        /* The Global Background Controller */
        .site-background-layers {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; /* Ensures content wrapper (z: 10) sits on top */
            pointer-events: none; /* Prevents interference with clicking content */
            background-color: var(--dark-slate); /* Base solid color */
        }

        /* Video element fix: Ensure z-index is lower than UI */
        .full-page-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1; /* Above base, below content */
            opacity: 0.55;
        }

        /* The Content Wrapper: The main site content lives here */
        .site-content-wrapper { 
            position: relative; 
            z-index: 10; 
        }

        /* 
        ===================================================================
        TYPOGRAPHY & GLOBAL UTILITIES
        ===================================================================
        */
        .gold-text-gradient {
            background: var(--gold-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .premium-caps-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--translucent-silk);
        }

        /* Custom Scrollbar for Luxury Feel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--matte-black); }
        ::-webkit-scrollbar-thumb { background: var(--gold-solid); border-radius: 3px; }

        /* 
        ===================================================================
        ENVELOPE INTRO OVERLAY
        ===================================================================
        */
        .envelope-overlay {
            position: fixed;
            inset: 0;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
            background:
                radial-gradient(circle at 50% 38%, rgba(0,77,56,0.55) 0%, transparent 62%),
                linear-gradient(160deg, var(--matte-black) 0%, var(--deep-emerald) 55%, var(--matte-black) 100%);
            cursor: pointer;
            transition: opacity 1s cubic-bezier(0.16,1,0.3,1), visibility 1s;
        }

        .envelope-overlay.envelope-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .envelope-names-preview {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(1.6rem, 5.5vw, 2.6rem);
            letter-spacing: 0.03em;
        }

        .envelope-box {
            position: relative;
            width: min(78vw, 300px);
            aspect-ratio: 3 / 2;
            perspective: 1000px;
        }

        .envelope-body {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, #0a1a13 0%, var(--deep-emerald) 100%);
            border: 1px solid var(--gold-muted);
            border-radius: 4px;
            box-shadow: var(--shadow-luxury);
        }

        .envelope-flap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 55%;
            background: linear-gradient(160deg, #0d2018 0%, var(--royal-emerald) 100%);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            border-bottom: 1px solid var(--gold-muted);
            transform-origin: top center;
            transition: transform 1.1s cubic-bezier(0.7, -0.2, 0.3, 1.3);
            z-index: 3;
        }

        .envelope-box.opened .envelope-flap {
            transform: rotateX(180deg);
        }

        .envelope-seal {
            position: absolute;
            top: 42%; left: 50%;
            transform: translate(-50%, -50%);
            width: 46px; height: 46px;
            border-radius: 50%;
            background: var(--gold-primary);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Amiri', serif;
            font-size: 1.2rem;
            color: var(--matte-black);
            box-shadow: 0 0 18px rgba(197,160,89,0.5);
            z-index: 4;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .envelope-box.opened .envelope-seal { 
            opacity: 0; 
            transform: translate(-50%, -50%) scale(0.5); 
        }

        .envelope-card {
            position: absolute;
            left: 6%; right: 6%;
            bottom: 8%;
            height: 78%;
            background: linear-gradient(180deg, #0e130f 0%, var(--matte-black) 100%);
            border: 1px solid var(--gold-muted);
            border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            padding: 1rem;
            transform: translateY(0);
            transition: transform 1.2s cubic-bezier(0.16,1,0.3,1) 0.35s;
            z-index: 2;
        }

        .envelope-box.opened .envelope-card { 
            transform: translateY(-38%); 
        }

        .envelope-card-text {
            font-family: 'Amiri', serif;
            font-size: 0.85rem;
            color: var(--gold-pale);
            line-height: 1.6;
        }

        .envelope-tap-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gold-pale);
            border: 1px solid var(--gold-muted);
            border-radius: 30px;
            padding: 0.7rem 1.6rem;
            background: rgba(0, 51, 36, 0.4);
            display: flex; align-items: center; gap: 0.6rem;
        }

        .envelope-tap-label::after { 
            content: '•'; 
            color: var(--gold-solid); 
            animation: pulseDot 1.5s infinite alternate; 
        }

        /* 
        ===================================================================
        SCROLL PROGRESS & REVEAL ANIMATIONS
        ===================================================================
        */
        .scroll-progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 3px;
            width: 0%;
            background: var(--gold-primary);
            z-index: 6000;
            box-shadow: 0 0 12px rgba(197, 160, 89, 0.6);
            transition: width 0.05s linear;
        }

        .reveal-element {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal-element.is-triggered { 
            opacity: 1; 
            transform: translateY(0); 
        }

        /* 
        ===================================================================
        BACKGROUND TEXTURES & OVERLAYS
        ===================================================================
        */
        .faded-photo-background {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2; /* Needs to be above video */
            background-image: url('kofolove.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.14;
            pointer-events: none;
        }

        .luxury-atmospheric-overlay-mesh {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 3;
            pointer-events: none;
            background:
                linear-gradient(to bottom, rgba(6, 11, 9, 0.55) 0%, rgba(6, 11, 9, 0.3) 40%, rgba(3, 5, 4, 0.7) 85%, var(--matte-black) 100%),
                radial-gradient(circle at 50% 50%, transparent 30%, rgba(3, 5, 4, 0.45) 100%),
                radial-gradient(circle at 20% 30%, rgba(0, 77, 56, 0.2) 0%, transparent 60%);
        }

        #luxury-gold-particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 4;
            pointer-events: none;
        }

        #floating-hearts-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 5;
            pointer-events: none;
        }

        .islamic-texture-overlay {
            position: absolute; inset: 0;
            z-index: 6;
            pointer-events: none;
            opacity: 0.5;
            mix-blend-mode: screen;
        }

        /* 
        ===================================================================
        HERO SECTION
        ===================================================================
        */
        .editorial-hero-header-container {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem 2rem;
            position: relative;
        }

        .sacred-bismillah-emblem {
            font-family: 'Amiri', serif;
            font-size: clamp(2.4rem, 6vw, 4.2rem);
            margin-bottom: 2.5rem;
            letter-spacing: 2px;
            font-weight: 700;
            filter: drop-shadow(0 4px 18px rgba(197, 160, 89, 0.35));
        }

        .matrimonial-tagline-callout {
            margin-bottom: 3rem;
            max-width: 650px;
            line-height: 2;
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .monumental-couple-names {
            font-size: clamp(3.5rem, 10vw, 7.5rem);
            font-weight: 300;
            font-style: italic;
            line-height: 1.05;
            letter-spacing: 0.02em;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .letter-reveal-wrap { display: inline-block; overflow: hidden; }
        
        .letter-char {
            display: inline-block;
            background: var(--gold-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            opacity: 0;
            transform: translateY(60%);
            animation: letterRise 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes letterRise {
            to { opacity: 1; transform: translateY(0); }
        }

        .luxury-geometric-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin: 3rem auto;
            width: 100%;
            max-width: 350px;
        }

        .geometric-axis-line {
            height: 1px;
            flex: 1;
            background: linear-gradient(90deg, transparent, var(--gold-solid), transparent);
            opacity: 0.8;
        }

        .geometric-diamond-node {
            width: 8px;
            height: 8px;
            transform: rotate(45deg);
            background: var(--gold-primary);
            box-shadow: var(--shadow-gold-glow);
        }

        .interlocking-rings-svg-container {
            margin: 1.2rem auto;
        }

        .interlocking-rings-svg {
            width: 78px;
            height: auto;
            animation: premiumContinuousGlow 4s ease-in-out infinite alternate;
        }

        @keyframes premiumContinuousGlow {
            0% { transform: scale(1); filter: drop-shadow(0px 8px 15px rgba(197, 160, 89, 0.15)); }
            100% { transform: scale(1.05); filter: drop-shadow(0px 12px 22px rgba(197, 160, 89, 0.45)); }
        }

        .matrimonial-event-classification {
            font-size: clamp(1.4rem, 3.2vw, 2.2rem);
            font-style: italic;
            color: var(--gold-solid);
            letter-spacing: 0.18em;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        .matrimonial-unified-hashtag {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.85rem, 1.8vw, 1.1rem);
            letter-spacing: 0.25em;
            color: var(--gold-pale);
            font-weight: 300;
            background: rgba(0, 51, 36, 0.4);
            padding: 0.6rem 1.8rem;
            border-radius: 30px;
            border: 1px solid var(--gold-muted);
            backdrop-filter: blur(4px);
            box-shadow: var(--shadow-subtle);
            margin-bottom: 2.5rem;
        }

        .date-location-block {
            display: flex;
            gap: clamp(2rem, 8vw, 5rem);
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .date-location-item { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }
        
        .date-location-value {
            font-size: clamp(1.6rem, 3.5vw, 2.2rem);
            font-style: italic;
            font-weight: 400;
            color: var(--white-silk);
        }

        /* 
        ===================================================================
        SECTION: SACRED APHORISM
        ===================================================================
        */
        .sacred-aphorism-monumental-section { padding: 6rem 2rem; max-width: 900px; margin: 0 auto; }

        .sacred-aphorism-architectural-frame {
            border: 1px solid rgba(197, 160, 89, 0.22);
            padding: 4rem 2.5rem;
            position: relative;
            background: linear-gradient(135deg, rgba(6, 11, 9, 0.85), rgba(3, 5, 4, 0.95));
            backdrop-filter: blur(12px);
            border-radius: 8px;
            box-shadow: var(--shadow-luxury);
        }

        .corner-accent-filigree { position: absolute; width: 20px; height: 20px; border: 2px solid var(--gold-solid); pointer-events: none; }
        .top-left-accent { top: 15px; left: 15px; border-right: none; border-bottom: none; }
        .top-right-accent { top: 15px; right: 15px; border-left: none; border-bottom: none; }
        .bottom-left-accent { bottom: 15px; left: 15px; border-right: none; border-top: none; }
        .bottom-right-accent { bottom: 15px; right: 15px; border-left: none; border-top: none; }

        .arabic-scripture-typography {
            font-family: 'Amiri', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            line-height: 2.2;
            color: var(--white-silk);
            direction: rtl;
            margin-bottom: 2.5rem;
            font-weight: 700;
        }

        .vernacular-translation-typography {
            font-size: clamp(1.05rem, 2vw, 1.3rem);
            font-style: italic;
            line-height: 1.9;
            color: rgba(244, 246, 246, 0.85);
            font-weight: 300;
            max-width: 700px;
            margin: 0 auto;
        }

        .scripture-citation-tag {
            display: inline-block;
            margin-top: 1.5rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gold-solid);
        }

        /* 
        ===================================================================
        SECTION: INFINITE MARQUEE
        ===================================================================
        */
        .infinite-marquee-cinematic-conveyor {
            width: 100vw;
            overflow: hidden;
            background: linear-gradient(90deg, rgba(0, 51, 36, 0.3), rgba(92, 107, 48, 0.2), rgba(0, 51, 36, 0.3));
            border-top: 1px solid rgba(197, 160, 89, 0.18);
            border-bottom: 1px solid rgba(197, 160, 89, 0.18);
            padding: 1.2rem 0;
            margin: 4rem 0;
            white-space: nowrap;
        }

        .marquee-high-velocity-wrapper { display: inline-block; animation: luxuryMarqueeEngine 25s linear infinite; }
        
        .marquee-editorial-text-node {
            font-size: clamp(1.3rem, 3vw, 2.2rem);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 300;
            color: var(--white-silk);
            padding-right: 4rem;
        }

        @keyframes luxuryMarqueeEngine { 
            0% { transform: translate3d(0,0,0); } 
            100% { transform: translate3d(-50%,0,0); } 
        }

        /* 
        ===================================================================
        SECTION: COUNTDOWN DASHBOARD
        ===================================================================
        */
        .chronometric-countdown-outer-wrapper { padding: 2rem 1rem; display: flex; justify-content: center; }
        
        .chronometric-luxe-dashboard {
            display: flex;
            width: 100%;
            max-width: 700px;
            background: rgba(6, 11, 9, 0.75);
            padding: 2.5rem 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-luxury);
        }

        .chronometric-segment-node { flex: 1; display: flex; flex-direction: column; align-items: center; }
        
        .chronometric-numerical-output {
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 300;
            background: var(--gold-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-style: italic;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .chronometric-descriptor-tag {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.55rem, 1.5vw, 0.7rem);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(244, 246, 246, 0.5);
            margin-top: 0.6rem;
        }

        .chronometric-splitter-colon {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: var(--gold-solid);
            opacity: 0.4;
            transform: translateY(-4px);
            padding: 0 0.4rem;
        }

        /* 
        ===================================================================
        SECTION: CHAPTERS NARRATIVE (CAROUSEL)
        ===================================================================
        */
        .chapters-narrative-section { padding: 6rem 2rem 4rem 2rem; max-width: 1100px; margin: 0 auto; }

        .chapters-grid {
            display: flex;
            gap: 1.5rem;
            margin-top: 4rem;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 1rem;
            scrollbar-width: none;
        }

        .chapters-grid::-webkit-scrollbar { display: none; }

        .chapter-card {
            position: relative;
            height: 420px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: var(--shadow-subtle);
            cursor: pointer;
            background: var(--matte-black);
            flex: 0 0 82%;
            max-width: 340px;
            scroll-snap-align: center;
        }

        @media (min-width: 900px) {
            .chapter-card { flex: 0 0 30%; }
        }

        .chapter-dots { display: flex; justify-content: center; gap: 0.6rem; margin-top: 1.8rem; }
        
        .chapter-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: rgba(197, 160, 89, 0.3);
            transition: var(--transition-snappy);
        }

        .chapter-dot.active { background: var(--gold-solid); width: 20px; border-radius: 4px; }

        .swipe-hint {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(244,246,246,0.4);
            text-align: center;
            margin-top: 1rem;
        }

        .chapter-img-container { width: 100%; height: 100%; position: relative; }
        
        .chapter-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
            filter: brightness(70%) contrast(105%) saturate(85%);
            opacity: 0.4;
        }

        .chapter-overlay-mesh {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(3,5,4,0.35) 0%, rgba(0,51,36,0.25) 50%, rgba(3,5,4,0.55) 100%);
            transition: var(--transition-snappy);
        }

        /* CARD ANIMATION STATE: EXPANDED */
        .chapter-face {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 2rem 1.8rem; text-align: center;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .chapter-face-front { opacity: 1; transform: translateY(0); }
        .chapter-face-back { opacity: 0; transform: translateY(28px); pointer-events: none; }
        
        .chapter-card.expanded .chapter-face-front { opacity: 0; transform: translateY(-28px); pointer-events: none; }
        .chapter-card.expanded .chapter-face-back { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .chapter-story-text {
            font-size: 1rem; line-height: 1.85; font-style: italic; color: var(--white-silk);
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            max-height: 260px; overflow-y: auto; margin: 1rem 0;
        }
        
        .chapter-close-indicator { margin-top: 0.5rem; }
        
        .chapter-number { 
            font-family: 'Montserrat', sans-serif; font-size: 0.75rem; 
            letter-spacing: 0.3em; color: var(--gold-solid); 
            text-transform: uppercase; margin-bottom: 0.8rem; text-shadow: 0 2px 10px rgba(0,0,0,0.8); 
        }

        .chapter-title { 
            font-size: 1.7rem; font-style: italic; font-weight: 400; 
            color: var(--white-silk); margin-bottom: 1.2rem; text-shadow: 0 2px 12px rgba(0,0,0,0.85); 
        }

        .chapter-tap-indicator {
            font-family: 'Montserrat', sans-serif; font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase;
            color: var(--gold-pale); border: 1px solid var(--gold-muted); padding: 0.4rem 1rem; border-radius: 20px;
            background: rgba(6, 11, 9, 0.6); backdrop-filter: blur(4px); align-self: center; opacity: 0.9;
            transition: var(--transition-snappy); margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;
        }

        .chapter-tap-indicator::after { content: '•'; color: var(--gold-solid); animation: pulseDot 1.5s infinite alternate; }

        @keyframes pulseDot { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        .chapter-card:hover .chapter-img { transform: scale(1.06); opacity: 0.55; filter: brightness(60%) contrast(110%); }
        .chapter-card:hover .chapter-tap-indicator { background: var(--gold-primary); color: var(--matte-black); border-color: transparent; box-shadow: var(--shadow-gold-glow); }

        /* 
        ===================================================================
        SECTION: MUSIC CONTROLS & UTILITIES
        ===================================================================
        */
        .music-toggle {
            position: fixed; bottom: 1.6rem; right: 1.6rem; z-index: 1500;
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(0, 51, 36, 0.65);
            border: 1px solid var(--gold-muted);
            backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-subtle);
            transition: var(--transition-snappy);
        }

        .music-toggle:hover { border-color: var(--gold-solid); box-shadow: var(--shadow-gold-glow); }

        .music-bars { display: flex; align-items: flex-end; gap: 3px; height: 16px; }
        
        .music-bars span { 
            width: 3px; background: var(--gold-pale); border-radius: 1px; 
            height: 5px; animation: musicbar 0.9s ease-in-out infinite; 
            animation-play-state: paused; 
        }

        .music-toggle.playing .music-bars span { animation-play-state: running; }

        .music-bars span:nth-child(1) { animation-delay: 0s; }
        .music-bars span:nth-child(2) { animation-delay: 0.2s; }
        .music-bars span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes musicbar { 0%, 100% { height: 5px; } 50% { height: 16px; } }

        /*

        ===================================================================
        */
        .itinerary-celebration-section { padding: 6rem 2rem; max-width: 1000px; margin: 0 auto; }

        .itinerary-card-column {
            background: linear-gradient(180deg, rgba(0, 77, 56, 0.2) 0%, rgba(6, 11, 9, 0.8) 100%);
            border: 1px solid rgba(197, 160, 89, 0.25); border-radius: 12px; padding: 4rem 2rem;

        .itinerary-card-column::before {

        .itinerary-badge-header { 
            font-family: 'Montserrat', sans-serif; font-size: 0.85rem;

        .itinerary-title-venue {

        .itinerary-time-marker {

            color: var(--gold-pale); border-top: 1px solid rgba(197, 160, 89, 0.2); 
            padding-top: 1.5rem; display: inline-block; width: 80%; 
        }
        <div class="itinerary-details-text">
            <p>Venue: The Grand Hall, Lagos-Ibadan Expressway, Osun State.</p>
            <p>Reception follows immediately after the Nikkah ceremony.</p>
        </div>
    </div>

</div>
</section>

<!-- 
===================================================================
GLOBAL SCRIPT ENGINE
===================================================================
-->
<script>
    /* 
    ===================================================================
    01. VIDEO INITIALIZATION (BUG FIX: Autoplay & Stacking)
    ===================================================================
    */
    const video = document.querySelector('.full-page-video');
    const playVideo = () => {
        if(video) {
            video.play().catch(err => console.log("Autoplay prevented by browser: ", err));
        }
    };

    // Envelope Interaction: Trigger video and remove overlay
    document.querySelector('.envelope-box').addEventListener('click', () => {
        document.querySelector('.envelope-box').classList.add('opened');
        setTimeout(() => {
            document.querySelector('.envelope-overlay').classList.add('envelope-hidden');
            document.body.classList.remove('envelope-locked');
            playVideo();
        }, 1200);
    });

    /* 
    ===================================================================
    02. SCROLL TRIGGER ENGINE
    ===================================================================
    */
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('is-triggered');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal-element').forEach(el => observer.observe(el));

    /* 
    ===================================================================
    03. COUNTDOWN LOGIC
    ===================================================================
    */
    const updateCountdown = () => {
        const weddingDate = new Date('August 20, 2026 09:00:00').getTime();
        const now = new Date().getTime();
        const gap = weddingDate - now;

        const d = Math.floor(gap / (1000 * 60 * 60 * 24));
        const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((gap % (1000 * 60)) / 1000);

        document.getElementById('days').innerText = d;
        document.getElementById('hours').innerText = h;
        document.getElementById('minutes').innerText = m;
        document.getElementById('seconds').innerText = s;
    };
    setInterval(updateCountdown, 1000);

    /* 
    ===================================================================
    04. AUDIO CONTEXT MANAGEMENT
    ===================================================================
    */
    const musicBtn = document.querySelector('.music-toggle');
    const audio = new Audio('wedding-theme.mp3'); 
    audio.loop = true;

    musicBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            musicBtn.classList.add('playing');
        } else {
            audio.pause();
            musicBtn.classList.remove('playing');
        }
    });

    /* 
    ===================================================================
    05. CHAPTER INTERACTION (EXPAND/COLLAPSE)
    ===================================================================
    */
    document.querySelectorAll('.chapter-card').forEach(card => {
        card.addEventListener('click', () => {
            card.classList.toggle('expanded');
        });
    });

    /* 
    ===================================================================
    06. SCROLL PROGRESS TRACKING
    ===================================================================
    */
    window.addEventListener('scroll', () => {
        const scroll = document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (scroll / height) * 100;
        document.querySelector('.scroll-progress-bar').style.width = scrolled + '%';
    });
</script>
